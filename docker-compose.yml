services:

  # ─────────────────────────────────────────
  # Service Laravel (PHP-FPM + Nginx)
  # ─────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      APP_NAME: "FilRouge API"
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: "http://localhost:8000"
      # APP_KEY sera genere automatiquement au demarrage si vide
      APP_KEY: ""

      # Base de donnees
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: laravel
      DB_USERNAME: root
      DB_PASSWORD: root

      # Sessions et cache
      SESSION_DRIVER: database
      SESSION_LIFETIME: 120
      CACHE_STORE: database
      QUEUE_CONNECTION: sync

      # Logs vers stderr (visibles avec docker compose logs app)
      LOG_CHANNEL: stderr
      LOG_LEVEL: debug

      # Mail
      MAIL_MAILER: log

      # Filesystem
      FILESYSTEM_DISK: local

    depends_on:
      mysql:
        condition: service_healthy
    restart: on-failure
    volumes:
      # Persister les logs et fichiers uploadés
      - app_storage:/app/storage/app/public
      - app_logs:/app/storage/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─────────────────────────────────────────
  # Service MySQL 8
  # ─────────────────────────────────────────
  mysql:
    image: mysql:8
    restart: always
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_ROOT_PASSWORD: root
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mysql_data:
  app_storage:
  app_logs:
