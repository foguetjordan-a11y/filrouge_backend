global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Metriques de l'application Laravel via /api/metrics
  - job_name: 'laravel-app'
    static_configs:
      - targets: ['app:8000']
    metrics_path: '/api/metrics'
    scrape_interval: 30s

  # Metriques de Prometheus lui-meme
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
