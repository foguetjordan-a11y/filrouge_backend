global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  # ── Job 1 : Application Laravel ──────────────────────────────
  - job_name: 'laravel-app'
    static_configs:
      - targets: ['app:8000']
    metrics_path: '/api/metrics'
    scrape_interval: 30s

  # ── Job 2 : Node Exporter (metriques systeme) ─────────────────
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 15s

  # ── Job 3 : Prometheus lui-meme ───────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    scrape_interval: 15s
