# ─────────────────────────────────────────
# SonarQube — Configuration du projet Laravel
# ─────────────────────────────────────────

sonar.projectKey=filrouge-backend
sonar.projectName=Filrouge Backend Laravel
sonar.projectVersion=1.0

# Sources et tests
sonar.sources=app
sonar.tests=tests

# Couverture de code PHP (généré par PHPUnit + pcov/xdebug)
sonar.php.coverage.reportPaths=coverage.xml

# Exclusions
sonar.exclusions=vendor/**,node_modules/**,storage/**,bootstrap/cache/**

# Encodage
sonar.sourceEncoding=UTF-8
