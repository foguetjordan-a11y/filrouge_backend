name: Laravel CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ══════════════════════════════════════════
  # JOB 1 — Linting (qualite du code)
  # ══════════════════════════════════════════
  lint:
    name: Linting PHP (Pint)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, zip
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Run Laravel Pint (linting)
        run: ./vendor/bin/pint --test

  # ══════════════════════════════════════════
  # JOB 2 — Tests automatiques (SQLite)
  # ══════════════════════════════════════════
  tests:
    name: Tests Laravel
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, bcmath, pdo_sqlite, pdo_mysql, zip
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Copy .env
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Run tests
        run: php artisan test --stop-on-failure

  # ══════════════════════════════════════════
  # JOB 3 — Validation migrations MySQL
  # ══════════════════════════════════════════
  migrations:
    name: Validation migrations MySQL
    runs-on: ubuntu-latest
    needs: tests

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, bcmath, pdo_mysql, zip
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Copy .env and configure MySQL
        run: |
          cp .env.example .env
          sed -i 's/^DB_CONNECTION=.*/DB_CONNECTION=mysql/' .env
          sed -i 's/^DB_HOST=.*/DB_HOST=127.0.0.1/' .env
          sed -i 's/^DB_DATABASE=.*/DB_DATABASE=test_db/' .env
          sed -i 's/^DB_USERNAME=.*/DB_USERNAME=root/' .env
          sed -i 's/^DB_PASSWORD=.*/DB_PASSWORD=root/' .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Run migrations
        run: php artisan migrate --force

  # ══════════════════════════════════════════
  # JOB 4 — Build Docker
  # ══════════════════════════════════════════
  docker-build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: migrations

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t filrouge-backend:latest .

      - name: Start containers
        run: |
          docker compose up -d
          echo "Attente demarrage..."
          sleep 30

      - name: Health check
        run: |
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/up)
            echo "Tentative $i - HTTP: $STATUS"
            if [ "$STATUS" != "000" ]; then
              echo "Application disponible!"
              exit 0
            fi
            sleep 5
          done
          docker compose logs app
          exit 1

      - name: Stop containers
        if: always()
        run: docker compose down

  # ══════════════════════════════════════════
  # JOB 5 — Deploiement O2Switch (CD)
  #          Uniquement sur push main
  # ══════════════════════════════════════════
  # deploy:
  #   name: Deploiement O2Switch
  #   needs: docker-build
  #   if: github.ref == 'refs/heads/main' && github.event_name == 'push'
  #   ... (activer apres configuration des secrets O2Switch)
