name: Laravel CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  laravel-tests:

    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:

    # 1. Récupérer le code
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. Installer PHP
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, bcmath, mysql
        coverage: none

    # 3. Installer Composer
    - name: Install dependencies
      run: composer install --no-progress --prefer-dist --optimize-autoloader

    # 4. Copier fichier .env
    - name: Copy .env
      run: cp .env.example .env

    # 5. Générer clé Laravel
    - name: Generate key
      run: php artisan key:generate

    # 6. Configurer la base de données
    - name: Set DB config
      run: |
        php artisan config:clear

    # 7. Migration
    - name: Run migrations
      env:
        DB_CONNECTION: mysql
        DB_HOST: 127.0.0.1
        DB_PORT: 3306
        DB_DATABASE: test_db
        DB_USERNAME: root
        DB_PASSWORD: root
      run: php artisan migrate

    # 8. Tests
    - name: Run tests
      run: php artisan test