name: Laravel CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ─────────────────────────────────────────
  # JOB 1 : Tests Laravel (PHP natif + MySQL)
  # ─────────────────────────────────────────
  laravel-tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, bcmath, mysql, zip
          coverage: none

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Copy .env
        run: cp .env.example .env

      - name: Generate key
        run: php artisan key:generate

      - name: Run migrations
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: test_db
          DB_USERNAME: root
          DB_PASSWORD: root
        run: php artisan migrate --force

      - name: Run tests
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: test_db
          DB_USERNAME: root
          DB_PASSWORD: root
        run: php artisan test

  # ─────────────────────────────────────────
  # JOB 2 : Build Docker
  # ─────────────────────────────────────────
  docker-build:
    runs-on: ubuntu-latest
    needs: laravel-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t laravel-app:latest .

      - name: Start containers
        run: |
          docker compose up -d
          echo "Waiting for app to be ready..."
          sleep 20

      - name: Check app is responding
        run: |
          curl --fail --retry 5 --retry-delay 5 http://localhost:8000 || \
          (docker compose logs app && exit 1)

      - name: Stop containers
        if: always()
        run: docker compose down

  # ─────────────────────────────────────────
  # JOB 3 : Déploiement (CD)
  # ─────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy simulation
        run: |
          echo "✅ Déploiement déclenché sur la branche main"
          echo "🐳 Image Docker construite et testée avec succès"
          echo "🚀 Deploy success — application prête à être déployée"
          echo "📦 Version : ${{ github.sha }}"
